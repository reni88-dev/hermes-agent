# =============================================================================
# docker-compose.yml — Hermes Agent (untuk testing lokal)
# =============================================================================
# Di Easypanel, gunakan Dockerfile langsung.
# File ini untuk testing lokal sebelum deploy.
#
# Usage:
#   docker compose up -d
#   docker compose exec hermes hermes setup
#   docker compose exec hermes hermes gateway run
# =============================================================================

services:
  hermes:
    build: .
    container_name: hermes
    restart: unless-stopped

    environment:
      - TZ=Asia/Jakarta

    volumes:
      - hermes-data:/opt/data

volumes:
  hermes-data:
    driver: local
